name: 匯入社團人氣號碼

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  import:
    if: startsWith(github.event.issue.title, '[人氣號碼]')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 匯入表單
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python import_github_issue.py
      - name: 更新人氣共識與手機網站
        run: |
          python refresh_crowd_report.py
          python pages_build.py
      - name: 保存提交結果
        run: |
          git config user.name "539 automation"
          git config user.email "actions@users.noreply.github.com"
          git add data reports site
          git commit -m "匯入社團人氣號碼 #${{ github.event.issue.number }}"
          git push
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: 發布手機網站
        id: deployment
        uses: actions/deploy-pages@v4
      - name: 關閉已處理表單
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close ${{ github.event.issue.number }} --comment "已匯入人氣觀察資料並重新發布手機戰報。"
