name: daily-539-update

on:
  workflow_dispatch:
  schedule:
    - cron: "50 12 * * 1-6"
    - cron: "*/10 13-15 * * 1-6"
    - cron: "10 16 * * 1-6"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update latest draw
        continue-on-error: true
        run: python update_539.py --latest
      - name: Build mobile site
        run: python pages_build.py
      - name: Commit updated data
        run: |
          git config user.name "539 automation"
          git config user.email "actions@users.noreply.github.com"
          git add data reports site
          git diff --cached --quiet || git commit -m "Update 539 data and reports"
          git push
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Push LINE report
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO_ID: ${{ secrets.LINE_TO_ID }}
          LINE_DELIVERY_MODE: ${{ secrets.LINE_DELIVERY_MODE }}
        run: python line_push.py
